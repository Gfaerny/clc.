name: debian_build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependency
      run: ./install_dependency.sh 
    - name: Run Cmake
      run: cmake .
    - name: Run Make
      run: make
